dataset:
  type: kitti
  path: data/kitti
  resize: [640, 480]

camera:
  fx: 718.856
  fy: 718.856
  cx: 607.1928
  cy: 185.2157

features:
  type: orb
  nfeatures: 3000

matching:
  ratio_test: 0.75

geometry:
  ransac_threshold: 1.0

initialization:
  max_search_frames: 10
  min_matches: 120
  min_inliers: 80
  min_parallax_deg: 1.0
  max_reproj_error: 3.0

triangulation:
  min_depth: 0.1
  max_reproj_error: 3.0
  min_parallax_deg: 1.0

tracking:
  max_reproj_error: 4.0
  min_track_length: 2

pnp:
  enabled: true
  reprojection_error: 4.0
  confidence: 0.99
  iterations_count: 100
  min_inliers: 30

keyframe:
  min_translation: 0.15
  min_rotation_deg: 5.0
  min_tracked_points: 80
